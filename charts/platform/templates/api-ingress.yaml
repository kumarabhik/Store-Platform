apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "platform.apiName" . }}
spec:
  ingressClassName: {{ .Values.global.ingressClassName | quote }}
  {{- if .Values.global.tls.enabled }}
  tls:
    - hosts:
        - {{ printf "api.%s" .Values.global.baseDomain | quote }}
      secretName: {{ .Values.global.tls.secretName | quote }}
  {{- end }}
  rules:
    - host: {{ printf "api.%s" .Values.global.baseDomain | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "platform.apiName" . }}
                port:
                  number: 80
