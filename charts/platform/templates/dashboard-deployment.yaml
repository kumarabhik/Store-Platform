apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "platform.dashboardName" . }}
spec:
  replicas: {{ .Values.dashboard.replicas }}
  selector:
    matchLabels:
      app: {{ include "platform.dashboardName" . }}
  template:
    metadata:
      labels:
        app: {{ include "platform.dashboardName" . }}
    spec:
      containers:
        - name: dashboard
          image: {{ .Values.dashboard.image | quote }}
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5
