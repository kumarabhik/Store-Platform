global:
  baseDomain: "192.168.49.2.nip.io"
  ingressClassName: "nginx"

api:
  image: "store-platform/api-node:dev"
  replicas: 1
  env:
    DB_PATH: "/data/platform.db"
    BASE_DOMAIN: "192.168.49.2.nip.io"
    INGRESS_CLASS_NAME: "nginx"
    STORE_CHART_REF: "bitnami/wordpress"
    BACKUP_DIR: "/data/backups"
    DASHBOARD_PUBLIC_URL: "http://127.0.0.1:5173"
    ADMIN_EMAILS: ""
    STRIPE_SECRET_KEY: ""
    STRIPE_PRICE_ID: ""
    STRIPE_PLAN_LABEL: "Growth"
    MAX_STORES: "50"
    TRUST_PROXY: "true"
    RATE_LIMIT_ENABLED: "true"
    RATE_LIMIT_CAPACITY: "120"
    RATE_LIMIT_REFILL_PER_SEC: "2"
    RATE_LIMIT_TTL_SEC: "300"
    RATE_LIMIT_MAX_KEYS: "20000"
    CREATE_RATE_LIMIT_CAPACITY: "8"
    CREATE_RATE_LIMIT_REFILL_PER_SEC: "0.2"
    CREATE_RATE_LIMIT_TTL_SEC: "600"
    CORS_ORIGINS: "http://127.0.0.1:5173,http://localhost:5173,http://dashboard.192.168.49.2.nip.io"
  persistence:
    enabled: true
    size: 1Gi
    storageClassName: ""

dashboard:
  enabled: false
