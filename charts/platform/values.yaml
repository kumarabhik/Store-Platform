global:
  baseDomain: "127.0.0.1.nip.io"
  ingressClassName: "nginx"
  tls:
    enabled: false
    secretName: "tls-secret"

api:
  image: "store-platform/api-node:dev"
  replicas: 1
  resources: {}
  env:
    DB_PATH: "/data/platform.db"
    BASE_DOMAIN: "127.0.0.1.nip.io"
    INGRESS_CLASS_NAME: "nginx"
    STORE_CHART_REF: "bitnami/wordpress"
    BACKUP_DIR: "/data/backups"
    DASHBOARD_PUBLIC_URL: "http://127.0.0.1:5173"
    ADMIN_EMAILS: ""
    STRIPE_SECRET_KEY: ""
    STRIPE_PRICE_ID: ""
    STRIPE_PLAN_LABEL: "Growth"
    MAX_STORES: "3"
    TRUST_PROXY: "true"
    RATE_LIMIT_ENABLED: "true"
    RATE_LIMIT_CAPACITY: "60"
    RATE_LIMIT_REFILL_PER_SEC: "1"
    RATE_LIMIT_TTL_SEC: "300"
    RATE_LIMIT_MAX_KEYS: "50000"
    CREATE_RATE_LIMIT_CAPACITY: "4"
    CREATE_RATE_LIMIT_REFILL_PER_SEC: "0.1"
    CREATE_RATE_LIMIT_TTL_SEC: "900"
    CORS_ORIGINS: "http://127.0.0.1:5173,http://localhost:5173,http://dashboard.127.0.0.1.nip.io"
  persistence:
    enabled: true
    size: 1Gi
    storageClassName: ""

dashboard:
  image: "store-platform/dashboard:dev"
  replicas: 1
  resources: {}

